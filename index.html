<body>

  <h1>ထိုင်းထီ စစ်ဆေးရာ</h1>
  <p>၆ လုံး ထည့်ပါ (ဥပမာ ၆၆၉၆၈၇)</p>

  <input type="text" id="ticket" placeholder="123456" maxlength="6" pattern="\d{6}"/>
  <button onclick="checkLotto()">စစ်ဆေးမယ်</button>

  <div id="result"></div>

  <script>
    async function checkLotto() {
      const num = document.getElementById('ticket').value.trim();
      const resultDiv = document.getElementById('result');

      if (!/^\d{6}$/.test(num)) {
        resultDiv.innerHTML = "<p style='color:red'>၆ လုံး ဂဏန်းအတိအကျ ထည့်ပါ</p>";
        return;
      }

      resultDiv.innerHTML = "<p class='loading'>စစ်ဆေးနေပါတယ်...</p>";

      try {
        // rayriffy API က latest ရလဒ်ကို ယူမယ်
        const res = await fetch('https://lotto.api.rayriffy.com/latest');
        const data = await res.json();

        if (data.status !== 'success') {
          throw new Error("API မှ အချက်အလက် မရပါ");
        }

        const drawDate = data.response.date; // ဥပမာ "1 มีนาคม 2569"
        const prizes = data.response; // အားလုံး ရလဒ်တွေ ရှိတယ်

        let prizeText = "";
        let found = false;
        let prizeName = "";

        // ตรวจรางวัลที่ 1
        if (prizes.first === num) {
          prizeText = "၁ နှစ်ရတယ်! 🎉 ၆ သန်း ရတယ်";
          prizeName = "ထီပေါက် - တစ်နှစ်ရတယ်";
          found = true;
        }
        // เลขหน้า 3 ตัว (2 รางวัล)
        else if (prizes.last3f.includes(num.slice(0,3)) || prizes.last3b.includes(num.slice(3,6))) {
          prizeText = "၃ လုံး နောက်ဆုံး / ရှေ့ ပေါက်တယ်! ၄၀၀၀ ဘတ်";
          prizeName = "၃ လုံး";
          found = true;
        }
        // เลขท้าย 2 ตัว
        else if (prizes.last2 === num.slice(4,6)) {
          prizeText = "၂ လုံး ပေါက်တယ်! ၂၀၀၀ ဘတ်";
          prizeName = "၂ လုံး";
          found = true;
        }
        // ถ้าใกล้เคียง (เช่น เลขท้าย 3 ตัว หรืออื่นๆ) สามารถเพิ่ม logic ได้

        if (found) {
          resultDiv.innerHTML = `
            <p class="win">${prizeText}</p>
            <p>ထီနှုတ်ချက်ရက်စွဲ → ${drawDate}</p>
            <small>(${prizeName})</small>
          `;
        } else {
          resultDiv.innerHTML = `
            <p class="lose">ဒီတစ်ခါ မပေါက်သေးဘူး 😔</p>
            <p>နောက်ဆုံးထီ ရက်စွဲ → ${drawDate}</p>
          `;
        }

      } catch (err) {
        resultDiv.innerHTML = `<p style="color:red">အမှားတက်နေတယ်: ${err.message}</p>`;
      }
    }
  </script>

</body>
